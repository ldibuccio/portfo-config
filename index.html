<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>PORTFO Config</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:24px 18px 40px;background:#0a0a0a;color:#f5f5f5;font-family:-apple-system,monospace;max-width:520px;margin:0 auto}
h1{text-align:center;font-size:28px;letter-spacing:4px;color:#ff5841;margin:16px 0 6px}
.sub{text-align:center;color:#888;font-size:12px;letter-spacing:1px;padding-bottom:24px;border-bottom:1px solid #2a2a2a;margin-bottom:24px}
.lbl{font-size:11px;letter-spacing:2px;color:#888;text-transform:uppercase;margin:0 0 10px 4px}
.panel{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:18px}
input{width:100%;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:6px;color:#f5f5f5;padding:10px 12px;font-size:15px;font-family:inherit;outline:none}
input:focus{border-color:#ff5841}
.help{font-size:11px;color:#888;margin-top:8px}
.help a{color:#ff5841}
.h{background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;padding:12px;margin-bottom:10px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end}
.h input{padding:8px 10px;font-size:14px}
.f label{display:block;font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase}
.del{background:transparent;border:1px solid #2a2a2a;color:#888;width:32px;height:32px;border-radius:6px;font-size:16px}
.add{width:100%;background:transparent;border:1px dashed #2a2a2a;color:#888;padding:12px;border-radius:8px;font-family:inherit;font-size:13px;letter-spacing:2px}
.save{width:100%;background:#ff5841;color:white;border:none;padding:16px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:700;letter-spacing:3px;margin-top:20px}
</style></head>
<body>
<h1>PORTFO</h1>
<div class="sub">PORTFOLIO TRACKER · CONFIG</div>
<div class="lbl">FINNHUB API KEY</div>
<div class="panel">
<input type="text" id="apiKey" placeholder="Paste your Finnhub key" autocomplete="off" autocapitalize="off" spellcheck="false">
<div class="help">Get a free key at <a href="https://finnhub.io" target="_blank">finnhub.io</a></div>
</div>
<div class="lbl">HOLDINGS</div>
<div id="holdings"></div>
<button class="add" id="addBtn" type="button">+ ADD HOLDING</button>
<button class="save" id="saveBtn" type="button">SAVE &amp; SYNC</button>
<script>
function gp(n){var m=location.search.match(new RegExp('[?&]'+n+'=([^&]*)'));return m?decodeURIComponent(m[1]):''}
var hEl=document.getElementById('holdings');
document.getElementById('apiKey').value=gp('apiKey');
var ex=[];try{var r=gp('holdings');if(r)ex=JSON.parse(r)}catch(e){}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function mk(d){d=d||{ticker:'',shares:'',avgPrice:''};
var div=document.createElement('div');div.className='h';
div.innerHTML='<div class="f"><label>Ticker</label><input type="text" class="tt" maxlength="7" autocapitalize="characters" autocomplete="off" spellcheck="false" value="'+esc(d.ticker)+'"></div>'+
'<div class="f"><label>Shares</label><input type="number" step="0.01" class="ts" inputmode="decimal" value="'+(d.shares===''?'':d.shares)+'"></div>'+
'<div class="f"><label>Avg Cost</label><input type="number" step="0.01" class="ta" inputmode="decimal" value="'+(d.avgPrice===''?'':d.avgPrice)+'"></div>'+
'<button class="del" type="button">×</button>';
div.querySelector('.del').onclick=function(){div.remove()};
div.querySelector('.tt').oninput=function(e){e.target.value=e.target.value.toUpperCase().replace(/[^A-Z0-9.]/g,'')};
hEl.appendChild(div)}
document.getElementById('addBtn').onclick=function(){if(hEl.children.length<10)mk()};
if(ex.length===0)mk({ticker:'AAPL',shares:'',avgPrice:''});else ex.forEach(function(h){mk(h)});
document.getElementById('saveBtn').onclick=function(){
var hs=[],rs=hEl.querySelectorAll('.h');
for(var i=0;i<rs.length;i++){
var t=rs[i].querySelector('.tt').value.trim().toUpperCase();
var s=parseFloat(rs[i].querySelector('.ts').value);
var a=parseFloat(rs[i].querySelector('.ta').value);
if(!t)continue;
if(isNaN(s)||s<=0){alert('Invalid shares for '+t);return}
if(isNaN(a)||a<0){alert('Invalid avg cost for '+t);return}
hs.push({ticker:t,shares:s,avgPrice:a})}
location.href='pebblejs://close#'+encodeURIComponent(JSON.stringify({apiKey:document.getElementById('apiKey').value.trim(),holdings:hs}))};
</script></body></html>
